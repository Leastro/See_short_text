name: Daily AI Content Generator

on:
  schedule:
    - cron: '0 22 * * *'  # 한국 시간 매일 오전 7시 (UTC 22:00)
  workflow_dispatch:      # 수동 실행 버튼 (테스트용으로 꼭 필요해요!)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 최신 버전 권장

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        # 우리가 사용하는 라이브러리인 openai와 firebase-admin을 설치합니다.
        run: npm install openai firebase-admin

      - name: Run Script
        env:
          # GitHub Secrets에 등록한 이름과 똑같이 맞춰야 합니다.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        # scripts 폴더 안에 generate_text.js가 있다면 아래 경로가 맞습니다.
        run: node scripts/generate_text.js